<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دعوتنامه عروسی محمد و حدیث</title>

    <!-- ===== متا تگ‌های شبکه‌های اجتماعی (واتساپ/تلگرام) ===== -->
    <meta property="og:title" content="دعوتنامه عروسی محمد و حدیث" />
    <meta property="og:image" content="https://www.mrahimi5436-source.github.io/wedding22/cover.jpg" />
    <meta property="og:description" content="ما را در بزرگترین شب زندگیمان همراهی کنید. ۲۵ مرداد ۱۴۰۵، تالار هرمس" />
    <meta property="og:url" content="https://www.mrahimi5436-source.github.io/wedding22/" />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #2a1f1f;
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
      }

      /* Splash */
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #2a1f1f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 2rem;
      }
      #splash .splash-title {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        color: #e8d5b0;
        font-size: 2.5rem;
      }
      #splash .splash-sub {
        color: #c4a882;
        font-size: 0.75rem;
        letter-spacing: 5px;
        text-transform: uppercase;
      }
      #splash .enter-btn {
        background: transparent;
        border: 1px solid rgba(196, 168, 130, 0.6);
        color: #e8d5b0;
        padding: 14px 40px;
        border-radius: 30px;
        font-size: 0.85rem;
        letter-spacing: 3px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        text-transform: uppercase;
        margin-top: 1rem;
        transition: all 0.3s;
      }
      #splash .enter-btn:hover {
        background: rgba(196, 168, 130, 0.15);
      }

      /* Timer section */
      #timer-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: #3b2f2f;
        border-radius: 20px;
        padding: 3rem 2.5rem;
        text-align: center;
        max-width: 480px;
        width: 100%;
        border: 1px solid rgba(196, 168, 130, 0.2);
        position: relative;
        z-index: 10;
      }
      .wedding-title {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        color: #e8d5b0;
        font-size: 2.5rem;
        letter-spacing: 1px;
        margin-bottom: 0.25rem;
      }
      .names {
        color: #c4a882;
        font-size: 0.75rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      .divider {
        width: 60px;
        height: 1px;
        background: #c4a882;
        margin: 1rem auto 2rem;
        opacity: 0.5;
      }
      .timer-grid {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }
      .timer-box {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(196, 168, 130, 0.25);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        min-width: 85px;
      }
      .timer-num {
        font-size: 2.8rem;
        font-weight: 600;
        color: #e8d5b0;
        line-height: 1;
        display: block;
      }
      .timer-label {
        font-size: 0.6rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #c4a882;
        margin-top: 8px;
        display: block;
      }
      .date-text {
        color: #c4a882;
        font-size: 1rem;
        letter-spacing: 2px;
        opacity: 0.7;
        margin-top: 1rem;
      }
      .address-link {
        display: block;
        text-decoration: none;
        margin-top: 1rem;
        cursor: pointer;
      }
      .address-text {
        color: #e8d5b0;
        font-size: 0.99rem;
        letter-spacing: 1px;
      }
      .address-sub {
        color: #c4a882;
        font-size: 1rem;
        letter-spacing: 1px;
        margin-top: 4px;
        opacity: 0.8;
      }
      .address-hint {
        color: #a6d046;
        font-size: 1.2rem;
        letter-spacing: 2px;
        margin-top: 10px;
      }
      .done-msg {
        color: #e8d5b0;
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 1.5rem;
        display: none;
      }
      .scroll-hint {
        margin-top: 2rem;
        color: #c4a882;
        font-size: 1rem;
        letter-spacing: 3px;
        opacity: 0.6;
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(6px);
        }
      }

      /* Pages section */
      #pages-section {
        padding: 2rem 1rem 4rem;
        max-width: 500px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }

      .page-card {
        opacity: 0;
        transform: translateY(60px);
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(196, 168, 130, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      .page-card.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .page-card img {
        width: 100%;
        display: block;
      }

      /* Confetti */
      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 998;
      }
    </style>
  </head>
  <body>
    <!-- Splash -->
    <div id="splash">
      <p class="splash-title">Wedding</p>
      <p class="splash-sub">Mohammad &amp; Hadis</p>
      <button class="enter-btn" onclick="enterSite()">
        🌹 ورود به دعوتنامه
      </button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <!-- Timer -->
    <div id="timer-section" style="display: none">
      <div class="card">
        <p class="wedding-title">Wedding</p>
        <p class="names">Mohammad &amp; Hadis</p>
        <div class="divider"></div>
        <div class="timer-grid" id="timer-grid">
          <div class="timer-box">
            <span class="timer-num" id="days">--</span>
            <span class="timer-label">روز</span>
          </div>
          <div class="timer-box">
            <span class="timer-num" id="hours">--</span>
            <span class="timer-label">ساعت</span>
          </div>
          <div class="timer-box">
            <span class="timer-num" id="mins">--</span>
            <span class="timer-label">دقیقه</span>
          </div>
          <div class="timer-box">
            <span class="timer-num" id="secs">--</span>
            <span class="timer-label">ثانیه</span>
          </div>
        </div>
        <p class="done-msg" id="done-msg">مبارک باشد 🌹</p>
        <p class="date-text">۲۵ مرداد ۱۴۰۵ &nbsp;|&nbsp; ساعت ۱۸:۰۰</p>
        <div class="divider" style="margin-top: 1.5rem"></div>

        <!-- ===== لینک مسیریابی (کاملاً فعال و کلیکی) ===== -->
        <a
          href="https://maps.app.goo.gl/goT2bqWSuafaofVW8"
          target="_blank"
          class="address-link"
        >
          <p class="address-text">📍 مشهد — پیامبر اعظم ۱۰۵</p>
          <p class="address-sub">بین گلستان ۱ و ۳</p>
          <p class="address-hint">میزبان شما خانواده محترم رحیمی - کاظمی</p>
        </a>

        <p class="scroll-hint">
          ↓ &nbsp;کارت دعوت - به پایین اسکرول کنید&nbsp; ↓
        </p>
      </div>
    </div>

    <!-- Pages -->
    <div id="pages-section" style="display: none">
      <div class="page-card">
        <img src="https://cdn.imgurl.ir/uploads/v95626_1_1.png" alt="صفحه 1" />
      </div>
      <div class="page-card">
        <img src="https://cdn.imgurl.ir/uploads/k54966_2.png" alt="صفحه 2" />
      </div>
      <div class="page-card">
        <img src="https://cdn.imgurl.ir/uploads/b37433_3.png" alt="صفحه 3" />
      </div>
      <div class="page-card">
        <img src="https://cdn.imgurl.ir/uploads/q150241_4.png" alt="صفحه 4" />
      </div>
      <div class="page-card">
        <img src="https://cdn.imgurl.ir/uploads/i569153_5.png" alt="صفحه 5" />
      </div>
    </div>

    <audio id="wedding-audio" loop>
      <source
        src="https://dl.teh-music.com/Music/Single/Mohammad%20Nouri%20-%20Aroosi.mp3"
        type="audio/mpeg"
      />
    </audio>

    <script>
      function enterSite() {
        document.getElementById('splash').style.display = 'none'
        document.getElementById('timer-section').style.display = 'flex'
        document.getElementById('pages-section').style.display = 'flex'
        document
          .getElementById('wedding-audio')
          .play()
          .catch(() => {})
        startConfetti()
        observeCards()
      }

      // Timer
      const weddingDate = new Date(2026, 7, 16, 18, 0, 0)
      function pad(n) {
        return String(Math.floor(n)).padStart(2, '0')
      }
      function tick() {
        const diff = weddingDate - new Date()
        if (diff <= 0) {
          document.getElementById('timer-grid').style.display = 'none'
          document.getElementById('done-msg').style.display = 'block'
          return
        }
        document.getElementById('days').textContent = pad(diff / 86400000)
        document.getElementById('hours').textContent = pad(
          (diff % 86400000) / 3600000
        )
        document.getElementById('mins').textContent = pad(
          (diff % 3600000) / 60000
        )
        document.getElementById('secs').textContent = pad((diff % 60000) / 1000)
      }
      tick()
      setInterval(tick, 1000)

      // Scroll reveal
      function observeCards() {
        const cards = document.querySelectorAll('.page-card')
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add('visible')
              }
            })
          },
          { threshold: 0.15 }
        )
        cards.forEach((c) => observer.observe(c))
      }

      // Confetti
      const canvas = document.getElementById('confetti-canvas')
      const ctx = canvas.getContext('2d')
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth
        canvas.height = window.innerHeight
      })
      const colors = [
        '#e8d5b0',
        '#c4a882',
        '#fff8e7',
        '#f5c842',
        '#e8a0a0',
        '#ffb347',
        '#d4af37',
        '#fff',
      ]
      let pieces = []
      function startConfetti() {
        pieces = Array.from({ length: 150 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 2.5 + 1,
          angle: Math.random() * 360,
          spin: Math.random() * 3 - 1.5,
          sway: Math.random() * 2 - 1,
          opacity: Math.random() * 0.6 + 0.4,
        }))
        drawConfetti()
      }
      function drawConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)
        pieces.forEach((p) => {
          ctx.save()
          ctx.globalAlpha = p.opacity
          ctx.translate(p.x, p.y)
          ctx.rotate((p.angle * Math.PI) / 180)
          ctx.fillStyle = p.color
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h)
          ctx.restore()
          p.y += p.speed
          p.x += p.sway
          p.angle += p.spin
          if (p.y > canvas.height + 20) {
            p.y = -15
            p.x = Math.random() * canvas.width
          }
        })
        requestAnimationFrame(drawConfetti)
      }
    </script>
  </body>
</html>
